name: Build And Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY_HOST: gitea.dylancruz.me
  IMAGE_NAME: gitea.dylancruz.me/${{ gitea.repository }}

jobs:
  check:
    runs-on: ubuntu-latest
    container:
      image: node:26-trixie

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify Node runtime
        run: |
          node --version
          node -e "import('node:sqlite')"

      - name: Install dependencies
        run: npm install

      - name: Check Svelte and TypeScript
        run: npm run check

  publish:
    runs-on: ubuntu-latest
    needs: check
    outputs:
      image: ${{ steps.image.outputs.image }}
      sha_tag: ${{ steps.image.outputs.sha_tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare image tags
        id: image
        run: |
          image="$(printf '%s' "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')"
          sha_tag="sha-${GITHUB_SHA:-${{ gitea.sha }}}"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${sha_tag}" >> "$GITHUB_OUTPUT"
          echo "IMAGE=${image}" >> "$GITHUB_ENV"
          echo "SHA_TAG=${sha_tag}" >> "$GITHUB_ENV"

      - name: Log in to Gitea registry
        run: |
          printf '%s' "${{ secrets.REGISTRY_TOKEN }}" | docker login "$REGISTRY_HOST" --username "${{ secrets.REGISTRY_USERNAME }}" --password-stdin

      - name: Build image
        run: |
          docker build --pull --tag "$IMAGE:latest" --tag "$IMAGE:$SHA_TAG" .

      - name: Push image
        run: |
          docker push "$IMAGE:latest"
          docker push "$IMAGE:$SHA_TAG"

  deploy:
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy compose file
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "mkdir -p '${{ secrets.DEPLOY_PATH }}'"
          scp -i ~/.ssh/deploy_key deploy/docker-compose.yml "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/docker-compose.yml"

      - name: Deploy image
        run: |
          printf '%s' "${{ secrets.REGISTRY_TOKEN }}" | ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "cd '${{ secrets.DEPLOY_PATH }}' && \
            docker login '$REGISTRY_HOST' --username '${{ secrets.REGISTRY_USERNAME }}' --password-stdin && \
            printf 'IMAGE=%s:%s\nORIGIN=%s\n' '${{ needs.publish.outputs.image }}' '${{ needs.publish.outputs.sha_tag }}' '${{ secrets.APP_ORIGIN }}' > .env && \
            docker compose pull && \
            docker compose up -d"

      - name: Health check
        run: |
          curl --fail --silent --show-error --retry 10 --retry-delay 3 "${{ secrets.APP_ORIGIN }}"
